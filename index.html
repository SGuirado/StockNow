<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TraceReagents</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            /* Colores Universidad de Málaga */
            --primary: #003366;
            /* Azul UMA */
            --accent: #003366;
            /* Azul claro UMA */
            --bg: #f1f5f9;
            --white: #ffffff;
            --danger: #d91d1d;
            /* Rojo para caducados */
            --text: #1e293b;
        }

        /* Título de la App */
        header h1 {
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -1px;
        }

        /* Icono cámara más grande */
        #start-btn {
            font-size: 2.5rem;
            /* Aumentado */
            padding: 20px;
        }

        /* Fecha caducada en rojo */
        .caducado {
            color: #d91d1d;
            font-weight: bold;
            text-decoration: underline;
        }

        /* Quitar fondo al icono del planeta */
        .btn-google {
            background: none !important;
            border: none !important;
            font-size: 1.2rem;
            box-shadow: none !important;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-login {
            background: none;
            /* Eliminamos el fondo para que sea más limpio */
            border: none;
            /* ELIMINADO EL MARCO */
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            /* Más grande */
            border-radius: 10px;
            font-size: 15px;
            /* Texto más grande */
            color: var(--primary);
            font-weight: bold;
            transition: transform 0.2s;
            /* Efecto suave al pulsar */
        }

        .btn-login img {
            width: 45px;
            /* Icono bastante más grande */
            height: 45px;
            margin-bottom: 4px;
        }

        /* Efecto visual al pasar el ratón para saber que es un botón */
        .btn-login:hover {
            transform: scale(1.05);
            background: rgba(0, 51, 102, 0.05);
            /* Un toque de color muy suave al pasar el ratón */
        }


        /* Estilo personalizado para el título principal */
        .header-actions h2 {
            font-family: 'Segoe UI', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            /* Tipo de fuente profesional */
            font-size: 50px;
            /* Tamaño de la fuente */
            font-weight: 800;
            /* Grosor de la letra (más negrita) */
            color: var(--primary);
            /* Color azul UMA */
            letter-spacing: 0.2px;
            /* Ajuste de espacio entre letras para un look más moderno */
            margin: 0;
            /* Eliminamos márgenes para que alinee bien con el logo */
        }

        .btn-system {
            background: #e2e8f0;
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .config-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        select,
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        #video-container {
            width: 100%;
            position: relative;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid var(--accent);
            margin-bottom: 15px;
            background: #000;
        }

        #video {
            width: 100%;
            display: block;
        }

        .scan-region {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 160px;
            border: 2px solid #22c55e;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }

        .btn-main {
            width: 100%;
            color: white;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            background: var(--accent);
        }

        .btn-main.active {
            background: var(--danger);
        }


        /* Contenedor de la tabla centrado como los desplegables */
        .table-container {
            width: 95%;
            /* Ajustado para que no ocupe todo el ancho, igual que los menús */
            max-width: 800px;
            margin: 0 auto;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            padding: 6px 2px !important;
            /* Reducimos el espacio entre columnas al mínimo */
            font-size: 0.85rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        ;

        th:nth-child(1),
        td:nth-child(1) {
            width: 50px;
            text-align: center;
        }

        /* Info (Ojo) */
        th:nth-child(2),
        td:nth-child(2) {
            width: auto;
        }

        /* Reactivo */
        th:nth-child(3),
        td:nth-child(3) {
            width: 75px;
        }

        /* Ubicación */
        th:nth-child(4),
        td:nth-child(4) {
            width: 55px;
            text-align: center;
        }

        /* Stock */
        th:nth-child(5),
        td:nth-child(5) {
            width: 85px;
        }

        /* Ref/Cad */

        th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            color: #64748b;
            font-size: 10px;
            cursor: pointer;
            user-select: none;
            /* Evita que se seleccione el texto al hacer click rápido */
        }

        td {
            word-wrap: break-word;
            /* Si el nombre del químico es muy largo, saltará de línea */
            vertical-align: top;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Aumentar tamaño de los encabezados de la tabla */
        thead th {
            font-size: 1.1rem;
            /* Puedes subirlo a 1.2rem si lo quieres aún más grande */
            padding: 15px 10px;
            /* Añadimos un poco más de espacio para que luzca mejor */
            color: var(--primary);
            background-color: #f8fafc;
            /* Un tono gris muy ligero para resaltar el área */
        }


        .cas-badge {
            background: #dcfce7;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            color: #166534;
        }

        .action-group {
            display: flex;
            gap: 5px;
        }

        .btn-retry {
            background: var(--info);
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .btn-google {
            background: var(--google);
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .editable-name {
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline dotted #cbd5e1;
        }

        /* Nuevo efecto de destello de pantalla completa */
        .flash-capture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .do-flash {
            animation: flash-frame 0.3s ease-out;
        }

        @keyframes flash-frame {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        /* Estilo para el buscador */
        #buscador {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
        }

        /* Ventana Modal Profesional */
        #modalEdicion {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #64748b;
        }

        .modal-content select,
        .modal-content input {
            margin-bottom: 15px;
        }

        .btn-nueva {
            background: var(--primary) !important;
            color: white !important;
        }

        .search-export-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }

        .btn-export {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            height: 48px;
            /* Para que coincida con la altura del input */
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Nuevos ajustes para multilab */
        .multilab-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .input-with-btn-container {
            display: flex;
            flex-direction: column;
            /* Asegura que el estante baje */
            gap: 10px;
            width: 100%;
        }

        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-with-btn {
            display: flex;
            flex: 1;
            gap: 5px;
        }

        /* Asegura que los selectores ocupen el máximo del contenedor flexible */
        .input-with-btn select {
            flex: 1;
            width: 100%;
            /* Obliga a los selectores a intentar ocupar el mismo ancho */
        }

        /* Contenedor para la casilla "Mostrar todo" */
        .checkbox-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .checkbox-filter input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .main-controls {
            display: flex;
            gap: 10px;
            align-items: stretch;
            margin-bottom: 15px;
        }

        .loc-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .btn-scan-new {
            flex: 1;
            margin-bottom: 0 !important;
            height: auto;
        }

        .btn-manual-edit {
            background: var(--primary);
            color: white;
            width: 60px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-size: 40px;
        }

        /* Estilo para la nueva fila superior con lupa */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .search-trigger {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 10px;
        }

        #modalBuscador {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 5000;
            /* Asegúrate de que esté por encima de todo */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            /* Nivel alto */
        }

        /* La caja blanca del buscador */
        #modalBuscador>div:first-child {
            background: white;
            width: 90%;
            /* Margen pequeño en móviles */
            max-width: 550px;
            /* Reducimos de 700px a 550px para que sea más esbelto */
            height: 80vh;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        /* Cabecera del buscador */
        .search-header {
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 10px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        #inputBuscadorReal {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        #inputBuscadorReal:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.1);
        }

        /* Área de resultados con scroll propio */
        .search-results {
            flex: 1;
            /* Ocupa todo el espacio restante */
            overflow-y: auto;
            /* Permite scroll si hay muchos resultados */
            padding: 10px;
            background: #ffffff;
        }

        /* Estilo para la tabla de resultados dentro del buscador */
        #tablaResultadosBusqueda {
            width: 100%;
            border-collapse: collapse;
        }

        #tablaResultadosBusqueda td {
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        /* Efecto de resaltado para TODOS los botones */
        button,
        .btn-system,
        .btn-main,
        .btn-login,
        .search-trigger,
        .btn-manual-edit {
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        button:hover,
        .btn-system:hover,
        .btn-main:hover,
        .btn-login:hover,
        .search-trigger:hover,
        .btn-manual-edit:hover {
            transform: scale(1.08) !important;
            /* Aumenta ligeramente el tamaño */
            filter: brightness(1.1);
            /* Brilla un poco más */
            cursor: pointer;
        }

        /* Ajuste para que los botones de acción (lápiz y papelera) estén juntos */
        .action-buttons-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Ajuste para la columna del ojo */
        .col-view {
            width: 40px;
            text-align: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Resaltado para el aviso de nombre no encontrado */
        .warn-icon {
            font-size: 1.2rem;
            cursor: pointer;
            filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.1));
        }

        td span,
        .warn-icon {
            display: inline-block;
            transition: transform 0.2s, filter 0.2s;
            cursor: pointer;
        }

        td span:hover,
        .warn-icon:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 5px #003366);
        }

        /* Ajuste de alineación para la tabla */
        table th,
        table td {
            vertical-align: middle;
        }

        /* Estilos para la Ficha Elegante */
        .ficha-detalle {
            line-height: 1.6;
            color: #1e293b;
        }

        .ficha-header {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .ficha-dato {
            margin-bottom: 12px;
            display: flex;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .ficha-label {
            font-weight: bold;
            color: #64748b;
            width: 140px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .ficha-valor {
            flex: 1;
            font-weight: 500;
        }

        /* Botón flotante de edición dentro de la ficha */
        .btn-edit-float {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Botones de acción en la esquina superior */
        .ficha-top-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 18px;
            /* Espacio entre iconos */
            align-items: center;
            z-index: 10;
        }

        .btn-icon-top {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            padding: 5px;
            line-height: 1;
        }

        .btn-icon-top:hover {
            transform: scale(1.25);
            filter: brightness(1.2);
        }

        .text-red {
            color: #d91d1d;
        }

        #modalFicha .modal-content {
            width: 440px;
            /* Forzamos la anchura al 80% del original (550px * 0.8) */
            max-width: 90%;
            /* Asegura que en móviles no se salga de la pantalla */
            position: relative;
            padding-top: 60px;
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            /* Nivel más alto para que tape al buscador */
        }



        /* Resaltado del ojo al pasar el cursor */
        .col-view:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.2));
            transition: all 0.2s ease;
        }

        /* Ajuste de columnas de la tabla para que no se amontonen */
        .tabla-reagentes th,
        .tabla-reagentes td {
            padding: 12px 8px;
            text-align: left;
        }

        /* Efecto para los iconos (Emoji-botones) */
        td span,
        td button {
            display: inline-block;
            /* Necesario para que el escalado funcione bien */
            transition: all 0.2s ease;
            /* Hace que el movimiento sea suave */
            cursor: pointer;
        }

        /* Cuando el cursor está encima del icono... */
        td span:hover,
        td button:hover {
            transform: scale(1.3);
            /* Aumenta un 30% el tamaño */
            filter: drop-shadow(0 0 5px rgba(0, 51, 102, 0.5));
            /* Iluminación suave azul */
            opacity: 1;
        }

        th:active {
            background-color: #e2e8f0;
            /* Se oscurece un poco al hacer clic */
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

</head>

<body>

    <div class="container">

        <div class="header-actions"
            style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px;">

            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <img src="Logo TR.png" alt="Logo" style="height: 100px; width: auto; border-radius: 8px;">
                <h2 style="margin: 0; font-size: 2rem; color: var(--primary);">TraceReagents</h2>
            </div>

            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="search-trigger" onclick="abrirBuscador()"
                    style="font-size: 2.8rem; background: none; border: none; cursor: pointer;">🔍</button>

                <button onclick="exportarCSV()" title="Exportar CSV"
                    style="background:none; border:none; font-size: 2.8rem; cursor:pointer; padding: 0;">
                    💾
                </button>

                <button class="btn-login" onclick="alert('Próximamente: Gestión de usuarios')"
                    style="display: flex; align-items: center; gap: 3px; padding: 8px 15px; border-radius: 20px;">
                    <img src="login.jpg" alt="User" style="width: 55px; height: 55px; border-radius: 50%;">
                    <span>Iniciar sesión</span>
                </button>
            </div>
        </div>




        <div class="multilab-panel"
            style="display: flex; flex-direction: column; gap: 12px; align-items: center; margin-bottom: 20px;">

            <div style="width: 50%; min-width: 280px; display: flex; flex-direction: column; gap: 10px;">

                <div class="input-with-btn">
                    <select id="selectFacultad" onchange="render()">
                        <option>Ciencias</option>
                        <option>Escuela Industriales</option>
                    </select>
                    <button onclick="agregarOpcion('selectFacultad', 'Facultad')"
                        class="btn-system btn-nueva">+</button>
                </div>

                <div class="input-with-btn">
                    <select id="selectDepto" onchange="render()">
                        <option>Química Analítica</option>
                        <option>Química Física</option>
                        <option>Química Inorgánica</option>
                        <option>Química Orgánica</option>
                        <option>Bioquímica</option>
                        <option>Física</option>
                        <option>Ingeniería Química</option>
                    </select>
                    <button onclick="agregarOpcion('selectDepto', 'Departamento')"
                        class="btn-system btn-nueva">+</button>
                </div>

                <div class="input-with-btn">
                    <select id="selectLab" onchange="render()">
                        <option>Laboratorio Alumnos</option>
                        <option>Investigación 1</option>
                        <option>Investigación 2</option>
                    </select>
                    <button onclick="agregarOpcion('selectLab', 'Laboratorio')" class="btn-system btn-nueva">+</button>
                </div>

            </div>

            <label class="checkbox-filter"
                style="display: flex; align-items: center; gap: 8px; justify-content: center; margin: 5px 0; cursor: pointer;">
                <input type="checkbox" id="checkMostrarTodo" onchange="render()">
                <span style="font-size: 0.9rem; font-weight: bold; color: var(--primary);">No filtrar por
                    laboratorio</span>
            </label>


            <div class="input-with-btn"
                style="display: flex; justify-content: center; gap: 10px; width: 20%; margin-bottom: 10px;">
                <select id="selectUbicacion"
                    style="width: 45%; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1;">
                    <option>Armario A1</option>
                    <option>Armario A2</option>
                </select>
                <button onclick="agregarOpcion('selectUbicacion', 'Ubicación')" class="btn-system btn-nueva">+</button>
            </div>

            <div class="input-with-btn"
                style="display: flex; justify-content: center; gap: 10px; width: 20%; margin-bottom: 10px;">
                <select id="selectEstante"
                    style="width: 45%; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1;">
                    <option value="Estante 1">Estante 1</option>
                    <option value="Estante 2">Estante 2</option>
                    <option value="Estante 3">Estante 3</option>
                </select>
                <button onclick="agregarOpcion('selectEstante', 'Estante')" class="btn-system btn-nueva">+</button>
            </div>

        </div>


        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="scan-region"></div>
        </div>

        <div
            style="width: 50%; min-width: 280px; margin: 10px auto; display: flex; align-items: center; gap: 15px; justify-content: center;">

            <button onclick="abrirModalManual()"
                style="flex: 1; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">
                <span style="font-size: 2.8rem; line-height: 1;">⌨️</span>
            </button>

            <button id="start-btn" class="btn-export" onclick="toggleScanner()"
                style="flex: 1; height: 60px; font-size: 2.3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0; border-radius: 40px;">
                <span style="font-size: 2.8rem; line-height: 2;">📷</span>
                <span>SCAN</span>
            </button>
        </div>


        <canvas id="canvas-proc" style="display:none;"></canvas>

        <div style="overflow-x:auto;">
            <div class="table-container">
                <table id="tablaReactivos">
                    <thead>
                        <tr style="font-size: 0.85rem; color: #64748b; text-align: left;">
                            <th style="padding: 10px; width: 60px; text-align: center;">Info</th>
                            <th onclick="ordenarPor('nombre')" style="padding: 10px; width: 85px;">Reactivo / Stock</th>
                            <th onclick="ordenarPor('cad')" style="padding: 10px;">Caducidad</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyA0EZkfX5PEaL9W9TLQH-B6WFukyQLOQQM",
                authDomain: "stocknow-e39e7.firebaseapp.com",
                databaseURL: "https://stocknow-e39e7-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "stocknow-e39e7",
                storageBucket: "stocknow-e39e7.firebasestorage.app",
                messagingSenderId: "57942162718",
                appId: "1:57942162718:web:06e809f8c9e8b3fe955d0f",
                measurementId: "G-BFKJP91GE9"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();


            let inventario = JSON.parse(localStorage.getItem('lab_inv_v5')) || [];
            let isScanning = false;
            let videoStream = null;
            let worker = null;
            let isProcessing = false;

            // Función genérica para añadir opciones a cualquier desplegable
            function agregarOpcion(idSelect, nombreCampo) {
                const n = prompt("Nuevo " + nombreCampo + ":");
                if (n) {
                    const s = document.getElementById(idSelect);
                    const o = document.createElement('option');
                    o.text = n; s.add(o); s.value = n;
                }
            }

            // Funciones para el nuevo modal manual
            function abrirModalManual() {
                document.getElementById('modalManual').style.display = 'flex';
                document.getElementById('manualCasInput').focus();
            }

            async function confirmarCasManual() {
                const cas = document.getElementById('manualCasInput').value.trim();
                if (/^(\d{2,7}-\d{2}-\d)$/.test(cas)) {
                    document.getElementById('modalManual').style.display = 'none';
                    document.getElementById('manualCasInput').value = "";
                    await procesarNuevoReactivo(cas);
                } else {
                    alert("Formato de CAS inválido");
                }
            }


            async function toggleScanner() {
                const btn = document.getElementById('start-btn');
                if (!isScanning) {
                    try {
                        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                        document.getElementById('video').srcObject = videoStream;
                        document.getElementById('video-container').style.display = 'block';
                        btn.innerText = "⏹️ DETENER"; btn.classList.add('active');
                        isScanning = true;
                        if (!worker) {
                            worker = await Tesseract.createWorker('eng');
                            // Esto obliga al escáner a ser mucho más preciso con los números CAS
                            await worker.setParameters({
                                tessedit_char_whitelist: '0123456789-',
                            });
                        }
                        cicloEscaneo();
                    } catch (e) { alert("Error de cámara"); }
                } else { detenerEscaneo(); }
            }

            function detenerEscaneo() {
                if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('video-container').style.display = 'none';
                document.getElementById('start-btn').innerText = "📷 SCAN";
                document.getElementById('start-btn').classList.remove('active');
                isScanning = false;
            }

            async function cicloEscaneo() {
                if (!isScanning || isProcessing) { requestAnimationFrame(cicloEscaneo); return; }
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas-proc');
                const ctx = canvas.getContext('2d');
                const scale = video.videoWidth / video.clientWidth;
                canvas.width = video.videoWidth * 0.9;
                canvas.height = 180 * scale;
                ctx.filter = 'contrast(1.6) grayscale(1)';
                ctx.drawImage(video, (video.videoWidth - canvas.width) / 2, (video.videoHeight - canvas.height) / 2, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

                try {
                    const { data: { text } } = await worker.recognize(canvas);
                    const match = text.match(/(\d{2,7}-\d{2}-\d)/);
                    if (match) {
                        const yaExiste = inventario.some(item => item.cas === cas);
                        if (!yaExiste) {
                            isProcessing = true;

                            // EFECTO VISUAL DE DESTELLO
                            let flashDiv = document.getElementById('flash-effect');
                            if (!flashDiv) {
                                flashDiv = document.createElement('div');
                                flashDiv.id = 'flash-effect';
                                flashDiv.className = 'flash-capture';
                                document.getElementById('video-container').appendChild(flashDiv);
                            }
                            flashDiv.classList.add('do-flash');
                            setTimeout(() => flashDiv.classList.remove('do-flash'), 300);

                            if (navigator.vibrate) navigator.vibrate(100);
                            await procesarNuevoReactivo(cas);
                            setTimeout(() => { isProcessing = false; }, 3000);
                        }
                    }
                } catch (e) { }
                if (isScanning) requestAnimationFrame(cicloEscaneo);
            }

            const diccionario = {
                'acid': 'Ácido', 'sodium': 'Sodio', 'chloride': 'Cloruro', 'sulfate': 'Sulfato', 'nitrate': 'Nitrato',
                'potassium': 'Potasio', 'silver': 'Plata', 'oxide': 'Óxido', 'ethanol': 'Etanol', 'hydrate': 'Hidratado',
                'iron': 'Hierro', 'copper': 'Cobre', 'magnesium': 'Magnesio', 'zinc': 'Zinc', 'calcium': 'Calcio'
            };

            function traducir(txt) {
                if (!txt) return "SIN NOMBRE";
                let res = txt.toLowerCase();
                Object.keys(diccionario).forEach(k => res = res.replace(new RegExp('\\b' + k + '\\b', 'g'), diccionario[k]));
                return res.toUpperCase();
            }

            // Nueva función para obtener datos automáticos de PubChem
            async function obtenerDatosQuimicos(cas) {
                try {
                    // 1. Buscamos el CID (ID único) a través del CAS
                    const resCID = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${cas}/cids/JSON`);
                    const dataCID = await resCID.json();

                    if (!dataCID.IdentifierList) return { nombre: "NO ENCONTRADO", ficha: "" };
                    const cid = dataCID.IdentifierList.CID[0];

                    // 2. Buscamos el nombre (intentando que sea en español de la lista de sinónimos)
                    const resName = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/synonyms/JSON`);
                    const dataName = await resName.json();

                    let nombreFinal = cas;
                    if (dataName.InformationList && dataName.InformationList.Information[0].Synonym) {
                        // Tomamos el primer nombre de la lista (suele ser el estándar)
                        nombreFinal = dataName.InformationList.Information[0].Synonym[0];
                    }

                    // 3. Generamos la URL automática de la sección de seguridad
                    const urlFicha = `https://pubchem.ncbi.nlm.nih.gov/compound/${cid}#section=Safety-and-Hazards`;

                    return { nombre: nombreFinal.toUpperCase(), ficha: urlFicha };
                } catch (e) {
                    return { nombre: cas, ficha: "" };
                }
            }

            // Nueva versión de procesarNuevoReactivo
            async function procesarNuevoReactivo(cas, reintento = false) {
                let item;
                if (!reintento) {
                    item = {
                        id: Date.now(),
                        nombre: "BUSCANDO...",
                        cas: cas,
                        ref: "",
                        facultad: document.getElementById('selectFacultad').value,     // Añadir esta línea
                        departamento: document.getElementById('selectDepto').value,    // Añadir esta línea
                        laboratorio: document.getElementById('selectLab').value,
                        ubicacion: document.getElementById('selectUbicacion').value,
                        estante: document.getElementById('selectEstante').value,
                        fallido: false,
                        cantidad: "250",
                        unidad: "g",
                        cad_mes: "01",
                        cad_anio: "2026",
                        observaciones: "",
                        ficha_url: "" // Nuevo campo para la ficha automática
                    };
                    inventario.unshift(item);
                } else {
                    item = inventario.find(x => x.cas === cas);
                    item.nombre = "REINTENTANDO...";
                    item.fallido = false;
                }
                render();

                const datos = await obtenerDatosQuimicos(cas);
                item.nombre = datos.nombre;
                item.ficha_url = datos.ficha;
                item.fallido = datos.nombre === "NO ENCONTRADO";

                actualizarStorage();
                render();
            }

            function render() {
                const ahora = new Date();
                const mesActual = ahora.getMonth() + 1;
                const anioActual = ahora.getFullYear();

                const filtroFacultad = document.getElementById('selectFacultad').value;
                const filtroDepto = document.getElementById('selectDepto').value;
                const filtroLab = document.getElementById('selectLab').value;
                const mostrarTodo = document.getElementById('checkMostrarTodo').checked;

                const tbody = document.getElementById('cuerpoTabla');

                const inventarioFiltrado = inventario.filter(r => {
                    if (mostrarTodo) return true;
                    const coincideFacultad = !filtroFacultad || (r.facultad || "") === filtroFacultad;
                    const coincideDepto = !filtroDepto || (r.departamento || "") === filtroDepto;
                    const coincideLab = !filtroLab || (r.laboratorio || "") === filtroLab;
                    return coincideFacultad && coincideDepto && coincideLab;
                });

                tbody.innerHTML = inventarioFiltrado.map(r => {
                    // Cálculo de caducidad
                    const esCaducado = (parseInt(r.cad_anio) < anioActual) ||
                        (parseInt(r.cad_anio) === anioActual && parseInt(r.cad_mes) < mesActual);

                    return `
<tr style="border-bottom: 1px solid #e2e8f0;">
    <td style="text-align: center; padding: 10px 5px;">
        <span onclick="verFicha(${r.id})" style="cursor:pointer; font-size:1.2rem;">👁️</span>
        ${r.ficha_url ? `<span onclick="window.open('${r.ficha_url}','_blank')" style="cursor:pointer; font-size:1rem; margin-left:4px;">📋</span>` : ''}
        ${(r.fallido || r.nombre.includes("BUSCANDO") || r.nombre === r.cas)
                            ? `<span onclick="procesarNuevoReactivo('${r.cas}', true)" style="cursor:pointer; font-size:1rem; margin-left:4px;">⚠️</span>` : ''}
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-weight: bold; color: var(--primary); line-height: 1.2; font-size: 0.9rem;">${r.nombre}</div>
        <div style="font-size: 0.8rem; color: #1e293b; margin-top: 2px;">
            Stock: <strong>${r.cantidad}${r.unidad}</strong> 
            <span style="color: #64748b; font-size: 0.7rem;">(${r.stock || 1} ud)</span>
        </div>
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-size: 0.85rem; ${esCaducado ? 'color:var(--danger); font-weight:bold;' : 'color:var(--primary); font-weight:500;'}">
            Exp: ${r.cad_mes}/${r.cad_anio}
        </div>
        <div style="font-size: 0.75rem; color: #64748b; margin-top: 2px;">
            ${r.ubicacion} (${r.estante || '-'})
        </div>
    </td>
</tr>
`;
                }).join('');
            }

            function editarNombre(id) {
                const r = inventario.find(x => x.id === id);
                const n = prompt("Nombre del reactivo:", r.nombre.includes("NO ENCONTRADO") ? "" : r.nombre);
                if (n) { r.nombre = n.toUpperCase(); r.fallido = false; actualizarStorage(); render(); }
            }

            function borrar(id) {
                if (confirm("¿Eliminar?")) { inventario = inventario.filter(x => x.id !== id); actualizarStorage(); render(); }
            }

            function actualizarStorage() {
                // 1. Guarda en el móvil (por si no hay internet)
                localStorage.setItem('lab_inv_v5', JSON.stringify(inventario));

                // 2. Envía TODO el inventario a Firebase
                db.ref('inventario').set(inventario)
                    .then(() => console.log("Sincronizado con Firebase"))
                    .catch(e => console.error("Error Firebase:", e));
            }

            async function agregarCasManual() {
                const input = document.getElementById('inputCasManual');
                const cas = input.value.trim();

                // Validar formato básico de CAS (números y guiones)
                const casRegex = /\b\d{2,7}-\d{2}-\d{1}\b/;
                if (casRegex.test(cas)) {
                    input.value = ""; // Limpiar campo
                    await procesarNuevoReactivo(cas);
                } else {
                    alert("Por favor, introduce un formato de CAS válido (ej: 67-64-1)");
                }
            }

            function exportarCSV() {
                let csv = "\uFEFFNombre del Producto,CAS,Ubicación,Cantidad,Unidad,Fecha Caducidad,Ficha Seguridad,Observaciones\n";
                inventario.forEach(r => {
                    const obs = (r.observaciones || "").replace(/\n/g, " ");
                    const ficha = r.ficha_url || "No disponible";
                    csv += `"${r.nombre}","${r.cas}","${r.ubicacion}","${r.cantidad}","${r.unidad}","${r.cad_mes}/${r.cad_anio}","${ficha}","${obs}"\n`;
                });

                // 3. Generar nombre de archivo con fecha y hora actual
                const ahora = new Date();
                const isoFecha = ahora.toISOString().split('T')[0]; // YYYY-MM-DD
                const hora = ahora.getHours().toString().padStart(2, '0') + "-" +
                    ahora.getMinutes().toString().padStart(2, '0');

                const nombreArchivo = `StockNow_${isoFecha}_${hora}.csv`;

                // 4. Proceso de descarga profesional
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                if (link.download !== undefined) {
                    const url = URL.createObjectURL(blob);
                    link.setAttribute("href", url);
                    link.setAttribute("download", nombreArchivo);
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }

            let editandoId = null;

            function verFicha(id) {
                const r = inventario.find(x => x.id === id);
                if (!r) return;
                editandoId = id;

                const contenido = document.getElementById('contenidoFicha');
                contenido.innerHTML = `
        <div class="ficha-header">
            <div>
                <h2 style="margin:0; color:var(--primary);">${r.nombre}</h2>
                <code style="background:#f1f5f9; padding:2px 5px; border-radius:4px;">CAS: ${r.cas}</code>
            </div>
        </div>
        <div class="ficha-dato"><span class="ficha-label">Facultad</span><span class="ficha-valor">${r.facultad || '-'}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Departamento</span><span class="ficha-valor">${r.departamento || '-'}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Laboratorio</span><span class="ficha-valor">${r.laboratorio || '-'}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Ubicación</span><span class="ficha-valor">${r.ubicacion}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Estante</span><span class="ficha-valor">${r.estante || '-'}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Referencia</span><span class="ficha-valor" style="font-weight:bold; color:var(--primary);">${r.ref || 'Sin referencia'}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Stock</span><span class="ficha-valor">${r.stock || 1} botes (${r.cantidad} ${r.unidad})</span></div>
        <div class="ficha-dato"><span class="ficha-label">Caducidad</span><span class="ficha-valor">${r.cad_mes}/${r.cad_anio}</span></div>
        <div class="ficha-dato"><span class="ficha-label">Notas</span><span class="ficha-valor">${r.observaciones || 'Sin notas'}</span></div>
    `;

                document.getElementById('modalFicha').style.display = 'flex';
            }

            function abrirEditorDesdeFicha() {
                document.getElementById('modalFicha').style.display = 'none';
                // Aquí llamamos a tu antigua función de cargar los inputs del modal de edición
                prepararEditor(editandoId);
                document.getElementById('modalEdicion').style.display = 'flex';
            }

            function cerrarModal() {
                document.getElementById('modalEdicion').style.display = 'none';
            }

            function prepararEditor(id) {
                const r = inventario.find(x => x.id === id);
                if (!r) return;

                // Sincronizar selectores de la ficha con los principales
                const cargarSelect = (idDestino, idOrigen, valor) => {
                    const dest = document.getElementById(idDestino);
                    dest.innerHTML = document.getElementById(idOrigen).innerHTML;
                    dest.value = valor || document.getElementById(idOrigen).value;
                };

                cargarSelect('editFacultad', 'selectFacultad', r.facultad);
                cargarSelect('editDepto', 'selectDepto', r.departamento);
                cargarSelect('editLab', 'selectLab', r.laboratorio);
                cargarSelect('editUbicacion', 'selectUbicacion', r.ubicacion);
                cargarSelect('editEstante', 'selectEstante', r.estante);

                // Rellenar campos de texto y número
                document.getElementById('editNombre').value = r.nombre;
                document.getElementById('editRef').value = r.ref || "";
                document.getElementById('editCant').value = r.cantidad || "";
                document.getElementById('editUnidad').value = r.unidad || "g";
                document.getElementById('editStock').value = r.stock || "1";
                document.getElementById('editObs').value = r.observaciones || "";
                document.getElementById('editFicha').value = r.ficha_url || "";

                // Configurar años en el selector de caducidad
                const anioSel = document.getElementById('editAnio');
                anioSel.innerHTML = "";
                const anioActual = new Date().getFullYear();
                for (let i = 0; i < 15; i++) {
                    let opt = document.createElement('option');
                    opt.value = anioActual + i; opt.text = anioActual + i;
                    anioSel.add(opt);
                }
                document.getElementById('editMes').value = r.cad_mes || "01";
                document.getElementById('editAnio').value = r.cad_anio || anioActual;
            }

            async function guardarCambiosModal() {
                // 1. Buscamos el reactivo en el inventario
                const r = inventario.find(x => x.id === editandoId);
                if (!r) return; // Seguridad por si no encuentra el ID

                // 2. Recogemos el valor de la nueva referencia
                const refVal = document.getElementById('editRef').value;

                // 3. Asignamos los valores de los desplegables y textos
                r.facultad = document.getElementById('editFacultad').value;
                r.departamento = document.getElementById('editDepto').value;
                r.laboratorio = document.getElementById('editLab').value;

                r.ref = refVal; // <--- NUEVO: Guardamos la referencia (Na25, K101, etc.)
                r.nombre = document.getElementById('editNombre').value.toUpperCase();
                r.ubicacion = document.getElementById('editUbicacion').value;
                r.estante = document.getElementById('editEstante').value;

                // 4. Guardamos Tamaño y Stock
                r.cantidad = document.getElementById('editCant').value; // Tamaño numérico
                r.unidad = document.getElementById('editUnidad').value;  // Unidad (mL, g, etc)
                r.stock = document.getElementById('editStock').value;   // Cantidad de botes

                // 5. Datos de caducidad y otros
                r.cad_mes = document.getElementById('editMes').value;
                r.cad_anio = document.getElementById('editAnio').value;
                r.observaciones = document.getElementById('editObs').value;
                r.ficha_url = document.getElementById('editFicha').value;

                // 6. Lógica de PubChem (reintentar nombre si estaba fallido)
                if (r.nombre.includes("BUSCANDO") || r.nombre === r.cas) {
                    const datos = await obtenerDatosQuimicos(r.cas);
                    r.nombre = datos.nombre;
                    if (datos.ficha) r.ficha_url = datos.ficha;
                }

                // 7. Finalizar: Guardar, Refrescar tabla y Cerrar Modal
                actualizarStorage(); // Asegúrate de que tu función se llame así o saveStorage()
                render();
                document.getElementById('modalEdicion').style.display = 'none';
            }

            let ordenAscendente = true;

            function filtrarTabla() {
                const term = document.getElementById('buscador').value.toLowerCase();
                const filas = document.querySelectorAll('#cuerpoTabla tr');
                filas.forEach(fila => {
                    const texto = fila.innerText.toLowerCase();
                    fila.style.display = texto.includes(term) ? '' : 'none';
                });
            }


            function ordenarPor(columna) {
                ordenAscendente = !ordenAscendente;

                inventario.sort((a, b) => {
                    let valorA, valorB;
                    if (columna === 'nombre') {
                        valorA = (a.nombre || "").toLowerCase();
                        valorB = (b.nombre || "").toLowerCase();
                    } else if (columna === 'cad') {
                        // Genera un número comparable: 202505 (Mayo 2025)
                        valorA = parseInt((a.cad_anio || "0") + (a.cad_mes || "0").toString().padStart(2, '0'));
                        valorB = parseInt((b.cad_anio || "0") + (b.cad_mes || "0").toString().padStart(2, '0'));
                    }

                    if (valorA < valorB) return ordenAscendente ? -1 : 1;
                    if (valorA > valorB) return ordenAscendente ? 1 : -1;
                    return 0;
                });

                render(); // Actualiza la de fondo

                // REVISIÓN CLAVE: Forzar el redibujado del buscador
                if (document.getElementById('modalBuscador').style.display === 'flex') {
                    filtrarBusquedaRealTime();
                }
            }


            // Este código hace que la pantalla se actualice sola cuando el móvil envía algo
            db.ref('inventario').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    inventario = data;
                    render();
                }
            });


            function abrirBuscador() {
                const modal = document.getElementById('modalBuscador');
                modal.style.display = 'flex';

                const input = document.getElementById('inputBuscadorReal');
                input.value = ''; // Aseguramos que el buscador empiece limpio
                input.focus();

                // Llamamos a la función de filtrado con el campo vacío 
                // para que muestre todos los reactivos de inicio
                filtrarBusquedaRealTime();
            }

            function cerrarBuscador() {
                document.getElementById('modalBuscador').style.display = 'none';
            }

            function filtrarBusquedaRealTime() {
                const term = document.getElementById('inputBuscadorReal').value.toLowerCase();
                const tabla = document.getElementById('cuerpoResultadosBusqueda');
                const ahora = new Date();
                const mesActual = ahora.getMonth() + 1;
                const anioActual = ahora.getFullYear();

                const filtrados = inventario.filter(r =>
                    r.nombre.toLowerCase().includes(term) ||
                    r.cas.includes(term) ||
                    (r.ref && r.ref.toLowerCase().includes(term)) ||
                    r.ubicacion.toLowerCase().includes(term)
                );

                if (filtrados.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#64748b;">No hay coincidencias</td></tr>';
                    return;
                }

                tabla.innerHTML = filtrados.map(r => {
                    // Lógica de caducidad
                    const esCaducado = (parseInt(r.cad_anio) < anioActual) ||
                        (parseInt(r.cad_anio) === anioActual && parseInt(r.cad_mes) < mesActual);
                    const estiloFecha = esCaducado ? 'color:var(--danger); font-weight:bold;' : 'color:#64748b;';

                    return `
<tr style="border-bottom: 1px solid #e2e8f0;">
    <td style="text-align: center; padding: 10px 5px;">
        <span onclick="verFicha(${r.id})" style="cursor:pointer; font-size:1.2rem;">👁️</span>
        ${r.ficha_url ? `<span onclick="window.open('${r.ficha_url}','_blank')" style="cursor:pointer; font-size:1rem; margin-left:4px;">📋</span>` : ''}
        ${(r.fallido || r.nombre.includes("BUSCANDO") || r.nombre === r.cas)
                            ? `<span onclick="procesarNuevoReactivo('${r.cas}', true)" style="cursor:pointer; font-size:1rem; margin-left:4px;">⚠️</span>` : ''}
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-weight: bold; color: var(--primary); line-height: 1.2; font-size: 0.9rem;">${r.nombre}</div>
        <div style="font-size: 0.8rem; color: #1e293b; margin-top: 2px;">
            Stock: <strong>${r.cantidad}${r.unidad}</strong> 
            <span style="color: #64748b; font-size: 0.7rem;">(${r.stock || 1} ud)</span>
        </div>
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-size: 0.85rem; ${esCaducado ? 'color:var(--danger); font-weight:bold;' : 'color:var(--primary); font-weight:500;'}">
            Exp: ${r.cad_mes}/${r.cad_anio}
        </div>
        <div style="font-size: 0.75rem; color: #64748b; margin-top: 2px;">
            ${r.ubicacion} (${r.estante || '-'})
        </div>
    </td>
</tr>
`;
                }).join('');
            }

            function confirmarBorradoDesdeFicha() {
                if (confirm("¿Estás seguro de que deseas eliminar este reactivo permanentemente?")) {
                    borrar(editandoId); // Reutiliza tu función de borrar existente
                    document.getElementById('modalEdicion').style.display = 'none';
                }
            }

        </script>

        <div id="modalFicha"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2500; align-items:center; justify-content:center;">
            <div class="modal-content" style="max-width: 550px;">
                <div class="ficha-top-actions">
                    <button class="btn-icon-top" onclick="abrirEditorDesdeFicha()" title="Editar">✏️</button>
                    <button class="btn-icon-top" onclick="document.getElementById('modalFicha').style.display='none'"
                        title="Cerrar" style="color: #d91d1d;">✖️</button>
                </div>

                <div id="contenidoFicha" class="ficha-detalle">
                </div>
            </div>
        </div>

        <div id="modalEdicion"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center;">
            <div class="modal-content"
                style="max-width: 550px; max-height: 90vh; overflow-y: auto; position: relative; padding-top: 60px;">

                <div class="ficha-top-actions">
                    <button class="btn-icon-top" onclick="confirmarBorradoDesdeFicha()" title="Eliminar">🗑️</button>
                    <button class="btn-icon-top" onclick="guardarCambiosModal()" title="Guardar cambios">💾</button>
                    <button class="btn-icon-top" onclick="document.getElementById('modalEdicion').style.display='none'"
                        title="Cancelar" style="color: #d91d1d;">✖️</button>
                </div>

                <h3>📝 Editar Registro</h3>

                <label>Facultad:</label>
                <select id="editFacultad"></select>

                <label>Departamento:</label>
                <select id="editDepto"></select>

                <label>Laboratorio:</label>
                <select id="editLab"></select>

                <label>Referencia Interna (Ref):</label>
                <input type="text" id="editRef" placeholder="Ej: Na25, K10...">

                <label>Nombre del Producto:</label>
                <input type="text" id="editNombre">

                <label>Ubicación:</label>
                <select id="editUbicacion"></select>

                <label>Estante:</label>
                <select id="editEstante">
                    <option value="Estante 1">Estante 1</option>
                    <option value="Estante 2">Estante 2</option>
                    <option value="Estante 3">Estante 3</option>
                </select>

                <label>Tamaño (Capacidad del envase):</label>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="number" id="editCant" step="any" placeholder="Ej: 500">
                    <select id="editUnidad">
                        <option value="mg">mg</option>
                        <option value="g">g</option>
                        <option value="kg">kg</option>
                        <option value="mL">mL</option>
                        <option value="L">L</option>
                    </select>
                </div>

                <label>Stock (Número de botes/unidades):</label>
                <input type="number" id="editStock" placeholder="¿Cuántos botes hay?" style="margin-bottom:15px;">

                <label>Fecha de Caducidad:</label>
                <div style="display:flex; gap:10px;">
                    <select id="editMes">
                        <option value="01">Ene</option>
                        <option value="02">Feb</option>
                        <option value="03">Mar</option>
                        <option value="04">Abr</option>
                        <option value="05">May</option>
                        <option value="06">Jun</option>
                        <option value="07">Jul</option>
                        <option value="08">Ago</option>
                        <option value="09">Sep</option>
                        <option value="10">Oct</option>
                        <option value="11">Nov</option>
                        <option value="12">Dic</option>
                    </select>
                    <select id="editAnio"></select>
                </div>

                <label>Enlace Ficha de Seguridad (URL):</label>
                <input type="url" id="editFicha" placeholder="https://pubchem.ncbi.nlm.nih.gov/...">

                <label>Observaciones:</label>
                <textarea id="editObs"
                    style="width:100%; height:60px; border-radius:8px; border:1px solid #cbd5e1; padding:10px;"></textarea>

            </div>
        </div>
        <div id="modalManual"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center;">
            <div class="modal-content">
                <h3>Añadir CAS Manual</h3>
                <input type="text" id="manualCasInput" placeholder="Ej: 64-17-5">
                <div style="display:flex; gap:10px;">
                    <button onclick="document.getElementById('modalManual').style.display='none'" class="btn-system"
                        style="flex:1;">Cancelar</button>
                    <button onclick="confirmarCasManual()" class="btn-export" style="flex:1;">AÑADIR</button>
                </div>
            </div>
        </div>

        <div id="modalBuscador">
            <div
                style="background: white; width: 95%; max-width: 700px; height: 80vh; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;">
                <div class="search-header"
                    style="display: flex; align-items: center; padding: 15px; gap: 10px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                    <input type="text" id="inputBuscadorReal" placeholder="Buscar reactivo, CAS o ubicación..."
                        onkeyup="filtrarBusquedaRealTime()"
                        style="flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none;">

                    <button onclick="cerrarBuscador()"
                        style="background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #6b21a8; font-weight: bold; padding: 0 5px;">
                        ✕
                    </button>
                </div>


                <div style="overflow-x:auto;">
                    <div class="search-results">
                        <table id="tablaResultadosBusqueda" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="font-size: 0.85rem; color: #64748b; text-align: left;">
                                    <th style="padding: 10px; width: 60px; text-align: center;">Info</th>
                                    <th onclick="ordenarPor('nombre')"
                                        style="padding: 10px; width: 85px; cursor: pointer;">
                                        Reactivo / Stock</th>
                                    <th onclick="ordenarPor('cad')" style="padding: 10px; cursor: pointer;">Caducidad
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoResultadosBusqueda">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

</body>

</html>
