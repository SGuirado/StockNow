<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TraceReagents</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            /* Colores Universidad de Málaga */
            --primary: #003366;
            /* Azul UMA */
            --accent: #003366;
            /* Azul claro UMA */
            --bg: #f1f5f9;
            --white: #ffffff;
            --danger: #d91d1d;
            /* Rojo para caducados */
            --text: #1e293b;
        }

        /* Título de la App */
        header h1 {
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -1px;
        }

        /* Icono cámara más grande */
        #start-btn {
            font-size: 2.5rem;
            /* Aumentado */
            padding: 20px;
        }

        /* Fecha caducada en rojo */
        .caducado {
            color: #d91d1d;
            font-weight: bold;
            text-decoration: underline;
        }

        /* Quitar fondo al icono del planeta */
        .btn-google {
            background: none !important;
            border: none !important;
            font-size: 1.2rem;
            box-shadow: none !important;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-login {
            background: none;
            /* Eliminamos el fondo para que sea más limpio */
            border: none;
            /* ELIMINADO EL MARCO */
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            /* Más grande */
            border-radius: 10px;
            font-size: 15px;
            /* Texto más grande */
            color: var(--primary);
            font-weight: bold;
            transition: transform 0.2s;
            /* Efecto suave al pulsar */
        }

        .btn-login img {
            width: 45px;
            /* Icono bastante más grande */
            height: 45px;
            margin-bottom: 4px;
        }

        /* Efecto visual al pasar el ratón para saber que es un botón */
        .btn-login:hover {
            transform: scale(1.05);
            background: rgba(0, 51, 102, 0.05);
            /* Un toque de color muy suave al pasar el ratón */
        }


        /* Estilo personalizado para el título principal */
        .header-actions h2 {
            font-family: 'Segoe UI', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            /* Tipo de fuente profesional */
            font-size: 50px;
            /* Tamaño de la fuente */
            font-weight: 800;
            /* Grosor de la letra (más negrita) */
            color: var(--primary);
            /* Color azul UMA */
            letter-spacing: 0.2px;
            /* Ajuste de espacio entre letras para un look más moderno */
            margin: 0;
            /* Eliminamos márgenes para que alinee bien con el logo */
        }

        .btn-system {
            background: #e2e8f0;
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .config-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        select,
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        #video-container {
            width: 100%;
            position: relative;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid var(--accent);
            margin-bottom: 15px;
            background: #000;
        }

        #video {
            width: 100%;
            display: block;
        }

        .scan-region {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 160px;
            border: 2px solid #22c55e;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }

        .btn-main {
            width: 100%;
            color: white;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            background: var(--accent);
        }

        .btn-main.active {
            background: var(--danger);
        }


        /* Contenedor de la tabla centrado como los desplegables */
        .table-container {
            width: 95%;
            /* Ajustado para que no ocupe todo el ancho, igual que los menús */
            max-width: 800px;
            margin: 0 auto;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            padding: 6px 2px !important;
            /* Reducimos el espacio entre columnas al mínimo */
            font-size: 0.85rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Info (Ojo) */
        th:nth-child(1),
        td:nth-child(1) {
            width: 50px;
            text-align: center;
        }

        /* Reactivo */
        th:nth-child(2),
        td:nth-child(2) {
            width: auto;
        }

        /* CAD-Ubicación */
        th:nth-child(3),
        td:nth-child(3) {
            width: 75px;
        }

        th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            color: #64748b;
            font-size: 10px;
            cursor: pointer;
            user-select: none;
            /* Evita que se seleccione el texto al hacer click rápido */
        }

        td {
            word-wrap: break-word;
            /* Si el nombre del químico es muy largo, saltará de línea */
            vertical-align: top;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Aumentar tamaño de los encabezados de la tabla */
        thead th {
            font-size: 1.1rem;
            /* Puedes subirlo a 1.2rem si lo quieres aún más grande */
            padding: 15px 10px;
            /* Añadimos un poco más de espacio para que luzca mejor */
            color: var(--primary);
            background-color: #f8fafc;
            /* Un tono gris muy ligero para resaltar el área */
        }


        .cas-badge {
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #475569;
            font-family: monospace;
            display: inline-block;
            margin-top: 8px;
            /* Espacio bajo el nombre */
        }

        .action-group {
            display: flex;
            gap: 5px;
        }

        .btn-retry {
            background: var(--info);
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .btn-google {
            background: var(--google);
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .editable-name {
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline dotted #cbd5e1;
        }

        /* Nuevo efecto de destello de pantalla completa */
        .flash-capture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .do-flash {
            animation: flash-frame 0.3s ease-out;
        }

        @keyframes flash-frame {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        /* Estilo para el buscador */
        #buscador {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
        }

        /* Ventana Modal Profesional */
        #modalEdicion {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #64748b;
        }

        .modal-content select,
        .modal-content input {
            margin-bottom: 15px;
        }

        .btn-nueva {
            background: var(--primary) !important;
            color: white !important;
        }

        .search-export-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }

        .btn-export {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            height: 48px;
            /* Para que coincida con la altura del input */
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Nuevos ajustes para multilab */
        .multilab-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .input-with-btn-container {
            display: flex;
            flex-direction: column;
            /* Asegura que el estante baje */
            gap: 10px;
            width: 100%;
        }

        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-with-btn {
            display: flex;
            flex: 1;
            gap: 5px;
        }

        /* Asegura que los selectores ocupen el máximo del contenedor flexible */
        .input-with-btn select {
            flex: 1;
            width: 100%;
            /* Obliga a los selectores a intentar ocupar el mismo ancho */
        }

        /* Contenedor para la casilla "Mostrar todo" */
        .checkbox-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .checkbox-filter input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .main-controls {
            display: flex;
            gap: 10px;
            align-items: stretch;
            margin-bottom: 15px;
        }

        .loc-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .btn-scan-new {
            flex: 1;
            margin-bottom: 0 !important;
            height: auto;
        }

        .btn-manual-edit {
            background: var(--primary);
            color: white;
            width: 60px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-size: 40px;
        }

        /* Estilo para la nueva fila superior con lupa */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .search-trigger {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 10px;
        }

        #modalBuscador {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 5000;
            /* Asegúrate de que esté por encima de todo */
            align-items: center;
            justify-content: center;
        }

        /* La caja blanca del buscador */
        #modalBuscador>div:first-child {
            background: white;
            width: 90%;
            /* Margen pequeño en móviles */
            max-width: 550px;
            /* Reducimos de 700px a 550px para que sea más esbelto */
            height: 80vh;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        /* Cabecera del buscador */
        .search-header {
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 10px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        #inputBuscadorReal {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        #inputBuscadorReal:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.1);
        }

        /* Área de resultados con scroll propio */
        .search-results {
            flex: 1;
            /* Ocupa todo el espacio restante */
            overflow-y: auto;
            /* Permite scroll si hay muchos resultados */
            padding: 10px;
            background: #ffffff;
        }

        /* Estilo para la tabla de resultados dentro del buscador */
        #tablaResultadosBusqueda {
            width: 100%;
            border-collapse: collapse;
        }

        #tablaResultadosBusqueda td {
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        /* Efecto de resaltado para TODOS los botones */
        button,
        .btn-system,
        .btn-main,
        .btn-login,
        .search-trigger,
        .btn-manual-edit {
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        button:hover,
        .btn-system:hover,
        .btn-main:hover,
        .btn-login:hover,
        .search-trigger:hover,
        .btn-manual-edit:hover {
            transform: scale(1.08) !important;
            /* Aumenta ligeramente el tamaño */
            filter: brightness(1.1);
            /* Brilla un poco más */
            cursor: pointer;
        }

        /* Ajuste para que los botones de acción (lápiz y papelera) estén juntos */
        .action-buttons-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Ajuste para la columna del ojo */
        .col-view {
            width: 40px;
            text-align: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Resaltado para el aviso de nombre no encontrado */
        .warn-icon {
            font-size: 1.2rem;
            cursor: pointer;
            filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.1));
        }

        td span,
        .warn-icon {
            display: inline-block;
            transition: transform 0.2s, filter 0.2s;
            cursor: pointer;
        }

        td span:hover,
        .warn-icon:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 5px #003366);
        }

        /* Ajuste de alineación para la tabla */
        table th,
        table td {
            vertical-align: middle;
        }

        /* Estilos para la Ficha Elegante */
        .ficha-detalle {
            line-height: 1.6;
            color: #1e293b;
        }

        .ficha-header {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .ficha-dato {
            margin-bottom: 12px;
            display: flex;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .ficha-label {
            font-weight: bold;
            color: #64748b;
            width: 140px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .ficha-valor {
            flex: 1;
            font-weight: 500;
        }

        /* Botón flotante de edición dentro de la ficha */
        .btn-edit-float {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Botones de acción en la esquina superior */
        .ficha-top-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 18px;
            /* Espacio entre iconos */
            align-items: center;
            z-index: 10;
        }

        .btn-icon-top {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            padding: 5px;
            line-height: 1;
        }

        .btn-icon-top:hover {
            transform: scale(1.25);
            filter: brightness(1.2);
        }

        .text-red {
            color: #d91d1d;
        }

        #modalFicha .modal-content {
            width: 440px;
            /* Forzamos la anchura al 80% del original (550px * 0.8) */
            max-width: 90%;
            /* Asegura que en móviles no se salga de la pantalla */
            position: relative;
            padding-top: 60px;
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            /* Nivel más alto para que tape al buscador */
        }

        .icono-png {
            width: 55px;
            /* Ancho del icono */
            height: 55px;
            /* Alto del icono */
            vertical-align: middle;
            /* Para que quede centrado si hay texto al lado */
            object-fit: contain;
            /* Evita que la imagen se deforme o se estire */
        }

        /* Resaltado del ojo al pasar el cursor */
        .col-view:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.2));
            transition: all 0.2s ease;
        }

        /* Ajuste de columnas de la tabla para que no se amontonen */
        .tabla-reagentes th,
        .tabla-reagentes td {
            padding: 12px 8px;
            text-align: left;
        }

        /* Efecto para los iconos (Emoji-botones) */
        td span,
        td button {
            display: inline-block;
            /* Necesario para que el escalado funcione bien */
            transition: all 0.2s ease;
            /* Hace que el movimiento sea suave */
            cursor: pointer;
        }

        /* Cuando el cursor está encima del icono... */
        td span:hover,
        td button:hover {
            transform: scale(1.3);
            /* Aumenta un 30% el tamaño */
            filter: drop-shadow(0 0 5px rgba(0, 51, 102, 0.5));
            /* Iluminación suave azul */
            opacity: 1;
        }

        th:active {
            background-color: #e2e8f0;
            /* Se oscurece un poco al hacer clic */
        }

        /* Fuerza que el encabezado de la ficha sea vertical */
        .ficha-header-wrapper {
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-start !important;
            width: 100%;
            margin-bottom: 20px;
        }

        /* Estilo para que el botón del lápiz sea invisible pero reaccione al ratón */
        .btn-icon-ficha {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon-ficha:hover {
            transform: scale(1.2);
            /* Crece al pasar el ratón */
            filter: brightness(1.2);
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

</head>

<body>

    <div class="container">

        <div class="header-actions"
            style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px;">

            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <img src="Logo TR.png" alt="Logo" style="height: 100px; width: auto; border-radius: 8px;">
                <h2 style="margin: 0; font-size: 2rem; color: var(--primary);">TraceReagents</h2>
            </div>

            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="search-trigger" onclick="abrirBuscador()"
                    style="font-size: 2.8rem; background: none; border: none; cursor: pointer;">🔍</button>

                <button onclick="abrirEditorListas()" title="Editar Desplegables"
                    style="font-size: 2.8rem; background: none; border: none; cursor: pointer;">🖊️</button>

                <button onclick="exportarCSV()" title="Exportar a Excel"
                    style="background:none; border:none; font-size: 2.8rem; cursor:pointer; padding: 0;">
                    <img src="export-excel.png" class="icono-png">
                </button>

                <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <button id="login-btn" class="btn-login" onclick="iniciarSesion()"
                        style="display: flex; align-items: center; gap: 3px; padding: 8px 15px; border-radius: 20px; cursor: pointer;">
                        <img src="login.jpg" alt="User" style="width: 55px; height: 55px; border-radius: 50%;">
                        <span id="user-info">Iniciar sesión</span>
                    </button>

                    <button id="logout-btn" onclick="cerrarSesion()"
                        style="display:none; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">
                        Salir
                    </button>
                </div>
            </div>
        </div>

        <div class="multilab-panel"
            style="display: flex; flex-direction: column; gap: 12px; align-items: center; margin-bottom: 20px;">

            <div style="width: 50%; min-width: 280px; display: flex; flex-direction: column; gap: 10px;">

                <div class="input-with-btn">
                    <select id="selectFacultad" class="form-select" onchange="render()">
                    </select>
                </div>

                <div class="input-with-btn">
                    <select id="selectDepto" class="form-select" onchange="render()">
                    </select>
                </div>

                <div class="input-with-btn">
                    <select id="selectLab" class="form-select" onchange="render()">
                    </select>
                </div>

            </div>

            <label class="checkbox-filter"
                style="display: flex; align-items: center; gap: 8px; justify-content: center; margin: 5px 0; cursor: pointer;">
                <input type="checkbox" id="checkMostrarTodo" onchange="render()">
                <span style="font-size: 0.9rem; font-weight: bold; color: var(--primary);">No filtrar por
                    laboratorio</span>
            </label>


            <div class="input-with-btn"
                style="display: flex; justify-content: center; gap: 10px; width: 50%; margin-bottom: 10px;">
                <select id="selectUbicacion" class="form-select">
                </select>
            </div>

            <div class="input-with-btn"
                style="display: flex; justify-content: center; gap: 10px; width: 50%; margin-bottom: 10px;">
                <select id="selectEstante" class="form-select">
                </select>
            </div>

        </div>


        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="scan-region"></div>
        </div>

        <div
            style="width: 50%; min-width: 280px; margin: 10px auto; display: flex; align-items: center; gap: 15px; justify-content: center;">

            <button onclick="abrirModalManual()"
                style="flex: 1; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">
                <span style="font-size: 2.8rem; line-height: 1;">⌨️</span>
            </button>

            <button id="start-btn" class="btn-export" onclick="toggleScanner()"
                style="flex: 1; height: 60px; font-size: 2.3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0; border-radius: 40px;">
                <span style="font-size: 2.8rem; line-height: 2;">📷</span>
                <span>SCAN</span>
            </button>
        </div>


        <canvas id="canvas-proc" style="display:none;"></canvas>

        <div style="overflow-x:auto;">
            <div class="table-container">
                <table id="tablaReactivos">
                    <thead>
                        <tr style="font-size: 0.85rem; color: #64748b; text-align: left;">
                            <th style="padding: 10px; width: 60px; text-align: center;">Info</th>
                            <th onclick="ordenarPor('nombre')" style="padding: 10px; width: 85px;">Reactivo / Stock</th>
                            <th onclick="ordenarPor('cad')" style="padding: 10px;">Caducidad</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>

        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyA0EZkfX5PEaL9W9TLQH-B6WFukyQLOQQM",
                authDomain: "stocknow-e39e7.firebaseapp.com",
                databaseURL: "https://stocknow-e39e7-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "stocknow-e39e7",
                storageBucket: "stocknow-e39e7.firebasestorage.app",
                messagingSenderId: "57942162718",
                appId: "1:57942162718:web:06e809f8c9e8b3fe955d0f",
                measurementId: "G-BFKJP91GE9"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // Escuchar cambios en la base de datos en tiempo real
            // --- SISTEMA DE LISTAS REFORZADO ---
            // Definimos siempre las categorías que DEBEN existir
            const categoriasMaestras = ["Facultad", "Departamento", "Laboratorio", "Ubicacion", "Estante"];

            let listasConfig = {
                Facultad: [], Departamento: [], Laboratorio: [], Ubicacion: [], Estante: []
            };

            // Escuchar cambios en la base de datos
            db.ref('configuracion/listas').on('value', (snapshot) => {
                const data = snapshot.val() || {}; // Si no hay nada, usamos un objeto vacío

                // REFUERZO: Nos aseguramos de que aunque Firebase no las devuelva, 
                // las categorías existan en nuestro código como listas vacías
                categoriasMaestras.forEach(cat => {
                    listasConfig[cat] = data[cat] || [];
                });

                actualizarTodosLosSelectores();

                // Si el editor está abierto, lo refrescamos
                if (document.getElementById('modalEditorListas').style.display === 'flex') {
                    renderizarEditorListas();
                }
            });

            function guardarListasEnFirebase() {
                db.ref('configuracion/listas').set(listasConfig);
            }

            function actualizarTodosLosSelectores() {
                const mapeo = {
                    Facultad: ['selectFacultad', 'editFacultad'],
                    Departamento: ['selectDepto', 'editDepto'],
                    Laboratorio: ['selectLab', 'editLab'],
                    Ubicacion: ['selectUbicacion', 'editUbicacion'],
                    Estante: ['selectEstante', 'editEstante']
                };

                for (let categoria in mapeo) {
                    mapeo[categoria].forEach(idSelect => {
                        const selectEl = document.getElementById(idSelect);
                        if (selectEl) {
                            const valorPrevio = selectEl.value;
                            selectEl.innerHTML = '<option value="">Seleccionar...</option>';
                            if (listasConfig[categoria]) {
                                listasConfig[categoria].forEach(opcion => {
                                    const opt = document.createElement('option');
                                    opt.value = opcion;
                                    opt.text = opcion;
                                    selectEl.add(opt);
                                });
                            }
                            if (valorPrevio) selectEl.value = valorPrevio;
                        }
                    });
                }
            }


            // Funciones para el Modal del Lápiz
            function abrirEditorListas() {
                document.getElementById('modalEditorListas').style.display = 'flex';
                renderizarEditorListas();
            }

            function cerrarEditorListas() {
                document.getElementById('modalEditorListas').style.display = 'none';
            }

            function renderizarEditorListas() {
                const contenedor = document.getElementById('contenidoEditorListas');
                let html = '';
                for (let categoria in listasConfig) {
                    html += `<div style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                    <h4 style="margin: 0 0 5px 0; color: var(--primary);">${categoria}</h4>
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="text" id="nuevo-${categoria}" placeholder="Añadir a ${categoria}..." style="flex:1; padding:8px;">
                        <button onclick="agregarItemLista('${categoria}')" style="background:var(--primary); color:white; border:none; padding:0 15px; border-radius:5px; cursor:pointer;">+</button>
                    </div>
                    <ul style="list-style:none; padding:0; margin:0;">`;

                    if (listasConfig[categoria]) {
                        listasConfig[categoria].forEach((item, index) => {
                            html += `<li style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; background:#f8fafc; padding:8px; border-radius:6px;">
                            <span>${item}</span>
                            <button onclick="borrarItemLista('${categoria}', ${index})" style="background:none; border:none; cursor:pointer;">🗑️</button>
                         </li>`;
                        });
                    }
                    html += `</ul></div>`;
                }
                contenedor.innerHTML = html;
            }

            function agregarItemLista(categoria) {
                const input = document.getElementById(`nuevo-${categoria}`);
                const valor = input.value.trim();
                if (valor) {
                    if (!listasConfig[categoria]) listasConfig[categoria] = [];
                    listasConfig[categoria].push(valor);
                    guardarListasEnFirebase();
                    input.value = '';
                }
            }

            function borrarItemLista(categoria, index) {
                if (confirm("¿Eliminar esta opción de la base de datos?")) {
                    listasConfig[categoria].splice(index, 1);
                    guardarListasEnFirebase();
                }
            }

            let inventario = [];
            let isScanning = false;
            let videoStream = null;
            let worker = null;
            let isProcessing = false;
            let infoId = null;

            // Funciones para el nuevo modal manual
            function abrirModalManual() {
                document.getElementById('modalManual').style.display = 'flex';
                document.getElementById('manualCasInput').focus();
            }

            async function confirmarCasManual() {
                const cas = document.getElementById('manualCasInput').value.trim();
                if (/^(\d{2,7}-\d{2}-\d)$/.test(cas)) {
                    document.getElementById('modalManual').style.display = 'none';
                    document.getElementById('manualCasInput').value = "";
                    await procesarNuevoReactivo(cas);
                } else {
                    alert("Formato de CAS inválido");
                }
            }

            // Variable para guardar los permisos del técnico que ha entrado
            // 1. Declaramos la variable de permisos 
            let datosUsuarioActual = null;

            // 2. Función para abrir Google
            function iniciarSesion() {
                const provider = new firebase.auth.GoogleAuthProvider();
                // Quitamos temporalmente la restricción de la UMA porque su servidor nos bloquea
                // provider.setCustomParameters({ hd: 'uma.es' }); 

                firebase.auth().signInWithPopup(provider).catch(err => console.error(err));
            }

            // 3. Función para salir
            function cerrarSesion() {
                firebase.auth().signOut();
            }

            // 4. El Vigilante (Comprueba si entras o sales)
            firebase.auth().onAuthStateChanged((user) => {
                const loginBtn = document.getElementById('login-btn');
                const logoutBtn = document.getElementById('logout-btn');
                const userInfo = document.getElementById('user-info');

                if (user) {
                    // CORRECCIÓN: Usamos firebase.firestore() directamente para no chocar con tu 'db'
                    firebase.firestore().collection("usuarios").doc(user.email).get().then((doc) => {
                        if (doc.exists) {
                            datosUsuarioActual = doc.data();
                        } else {
                            datosUsuarioActual = { rol: "lector" };
                        }

                        if (logoutBtn) logoutBtn.style.display = 'inline';
                        if (userInfo) userInfo.innerText = user.displayName.split(' ')[0];

                        // CORRECCIÓN: Llamamos a TU función para actualizar la pantalla
                        render();
                    }).catch(err => console.error("Error permisos:", err));
                } else {
                    datosUsuarioActual = null;
                    if (logoutBtn) logoutBtn.style.display = 'none';
                    if (userInfo) userInfo.innerText = "Iniciar sesión";

                    // CORRECCIÓN: Llamamos a TU función
                    render();
                }
            });

            // 5. Función Juez para decidir quién ve los botones de edición
            function puedeEditar(reactivo) {
                if (!datosUsuarioActual) return false;
                return (
                    datosUsuarioActual.facultad === reactivo.facultad &&
                    datosUsuarioActual.departamento === reactivo.departamento &&
                    datosUsuarioActual.laboratorio === reactivo.laboratorio
                );
            }

            async function toggleScanner() {
                const btn = document.getElementById('start-btn');
                if (!isScanning) {
                    try {
                        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                        document.getElementById('video').srcObject = videoStream;
                        document.getElementById('video-container').style.display = 'block';
                        btn.innerText = "⏹️ DETENER"; btn.classList.add('active');
                        isScanning = true;
                        if (!worker) {
                            worker = await Tesseract.createWorker('eng');
                            // Esto obliga al escáner a ser mucho más preciso con los números CAS
                            await worker.setParameters({
                                tessedit_char_whitelist: '0123456789-',
                            });
                        }
                        cicloEscaneo();
                    } catch (e) { alert("Error de cámara"); }
                } else { detenerEscaneo(); }
            }

            function detenerEscaneo() {
                if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('video-container').style.display = 'none';
                document.getElementById('start-btn').innerText = "📷 SCAN";
                document.getElementById('start-btn').classList.remove('active');
                isScanning = false;
            }

            let escaneoEnPausa = false;
            async function cicloEscaneo() {
                if (!isScanning || isProcessing) { requestAnimationFrame(cicloEscaneo); return; }
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas-proc');
                const ctx = canvas.getContext('2d');
                const scale = video.videoWidth / video.clientWidth;
                canvas.width = video.videoWidth * 0.9;
                canvas.height = 180 * scale;
                ctx.filter = 'contrast(1.6) grayscale(1)';
                ctx.drawImage(video, (video.videoWidth - canvas.width) / 2, (video.videoHeight - canvas.height) / 2, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

                try {
                    const { data: { text } } = await worker.recognize(canvas);
                    const match = text.match(/(\d{2,7}-\d{2}-\d)/);
                    if (match) {
                        const detectedCas = match[1]; // Guardar el match en una constante
                        const yaExiste = inventario.some(item => item.cas === detectedCas);
                        if (!yaExiste) {
                            isProcessing = true;

                            // EFECTO VISUAL DE DESTELLO
                            let flashDiv = document.getElementById('flash-effect');
                            if (!flashDiv) {
                                flashDiv = document.createElement('div');
                                flashDiv.id = 'flash-effect';
                                flashDiv.className = 'flash-capture';
                                document.getElementById('video-container').appendChild(flashDiv);
                            }
                            flashDiv.classList.add('do-flash');
                            setTimeout(() => flashDiv.classList.remove('do-flash'), 300);

                            // Si el escáner NO está en pausa, procedemos a leer
                            if (!escaneoEnPausa) {
                                navigator.vibrate(100);

                                // 1. Ponemos el semáforo en rojo para no leer el mismo bote 50 veces por segundo
                                escaneoEnPausa = true;

                                // 2. Mandamos el dato a la tabla (¡SIN la palabra 'await'! Así la cámara sigue libre)
                                procesarNuevoReactivo(detectedCas);

                                // 3. A los 2.5 segundos, volvemos a poner el semáforo en verde para el siguiente bote
                                setTimeout(() => {
                                    escaneoEnPausa = false;
                                }, 2500);
                            }
                            setTimeout(() => { isProcessing = false; }, 3000);
                        }
                    }
                } catch (e) { }
                if (isScanning) requestAnimationFrame(cicloEscaneo);
            }

            const diccionario = {
                'acid': 'Ácido', 'sodium': 'Sodio', 'chloride': 'Cloruro', 'sulfate': 'Sulfato', 'nitrate': 'Nitrato',
                'potassium': 'Potasio', 'silver': 'Plata', 'oxide': 'Óxido', 'ethanol': 'Etanol', 'hydrate': 'Hidratado',
                'iron': 'Hierro', 'copper': 'Cobre', 'magnesium': 'Magnesio', 'zinc': 'Zinc', 'calcium': 'Calcio'
            };

            function traducir(txt) {
                if (!txt) return "SIN NOMBRE";
                let res = txt.toLowerCase();
                Object.keys(diccionario).forEach(k => res = res.replace(new RegExp('\\b' + k + '\\b', 'g'), diccionario[k]));
                return res.toUpperCase();
            }

            // Nueva función para obtener datos automáticos de PubChem
            async function obtenerDatosQuimicos(cas) {
                try {
                    // 1. Buscamos el CID (ID único) a través del CAS
                    const resCID = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${cas}/cids/JSON`);
                    const dataCID = await resCID.json();

                    if (!dataCID.IdentifierList) return { nombre: "NO ENCONTRADO", ficha: "" };
                    const cid = dataCID.IdentifierList.CID[0];

                    // 2. Buscamos el nombre (intentando que sea en español de la lista de sinónimos)
                    const resName = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/synonyms/JSON`);
                    const dataName = await resName.json();

                    let nombreFinal = cas;
                    if (dataName.InformationList && dataName.InformationList.Information[0].Synonym) {
                        // Tomamos el primer nombre de la lista (suele ser el estándar)
                        nombreFinal = dataName.InformationList.Information[0].Synonym[0];
                    }

                    // 3. Generamos la URL automática de la sección de seguridad
                    const urlFicha = `https://pubchem.ncbi.nlm.nih.gov/compound/${cid}#section=Safety-and-Hazards`;

                    return { nombre: nombreFinal.toUpperCase(), ficha: urlFicha };
                } catch (e) {
                    return { nombre: cas, ficha: "" };
                }
            }

            async function procesarNuevoReactivo(cas, reintento = false) {
                let item;

                // 1. CREAMOS EL REACTIVO TEMPORAL
                if (!reintento) {
                    item = {
                        id: Date.now(),
                        nombre: "BUSCANDO...",
                        cas: cas,
                        ref: "",
                        facultad: document.getElementById('selectFacultad') ? document.getElementById('selectFacultad').value : "",
                        departamento: document.getElementById('selectDepto') ? document.getElementById('selectDepto').value : "",
                        laboratorio: document.getElementById('selectLab') ? document.getElementById('selectLab').value : "",
                        ubicacion: document.getElementById('selectUbicacion') ? document.getElementById('selectUbicacion').value : "",
                        estante: document.getElementById('selectEstante') ? document.getElementById('selectEstante').value : "",
                        fallido: false,
                        cantidad: "250",
                        unidad: "g",
                        cad_mes: "01",
                        cad_anio: "2026",
                        observaciones: "",
                        ficha_url: ""
                    };
                    inventario.unshift(item);
                } else {
                    item = inventario.find(x => x.cas === cas);
                    if (item) {
                        item.nombre = "REINTENTANDO...";
                        item.fallido = false;
                    }
                }

                // Dibujamos la tabla para que se vea el "BUSCANDO..."
                render();

                // 2. VAMOS A INTERNET A POR LOS DATOS
                const datos = await obtenerDatosQuimicos(cas);

                // Guardamos el nombre real en nuestro 'item'
                if (item) {
                    item.nombre = datos.nombre;
                    item.ficha_url = datos.ficha;
                    item.fallido = datos.nombre === "NO ENCONTRADO";
                }

                // 3. GUARDAMOS EN BASE DE DATOS Y REDIBUJAMOS LA TABLA
                // Usamos 'try' para que, si el guardado da un error, el código no se rompa
                try {
                    if (typeof actualizarStorage === 'function') {
                        actualizarStorage();
                    }
                } catch (error) {
                    console.warn("Aviso al guardar:", error);
                }

                // ESTA ES LA LÍNEA CRÍTICA: Volvemos a dibujar la tabla principal con el nombre real
                render();

                // EXTRA: Si tenías la ventana de la Lupa (buscador) abierta, actualizamos su tabla también
                if (typeof realizarBusqueda === 'function') {
                    try {
                        realizarBusqueda();
                    } catch (e) { }
                }
            }

            function render() {
                const ahora = new Date();
                const mesActual = ahora.getMonth() + 1;
                const anioActual = ahora.getFullYear();

                const filtroFacultad = document.getElementById('selectFacultad').value;
                const filtroDepto = document.getElementById('selectDepto').value;
                const filtroLab = document.getElementById('selectLab').value;
                const mostrarTodo = document.getElementById('checkMostrarTodo').checked;

                const tbody = document.getElementById('cuerpoTabla');

                const inventarioFiltrado = inventario.filter(r => {
                    if (mostrarTodo) return true;
                    const coincideFacultad = !filtroFacultad || (r.facultad || "") === filtroFacultad;
                    const coincideDepto = !filtroDepto || (r.departamento || "") === filtroDepto;
                    const coincideLab = !filtroLab || (r.laboratorio || "") === filtroLab;
                    return coincideFacultad && coincideDepto && coincideLab;
                });

                tbody.innerHTML = inventarioFiltrado.map(r => {
                    // Cálculo de caducidad
                    const esCaducado = (parseInt(r.cad_anio) < anioActual) ||
                        (parseInt(r.cad_anio) === anioActual && parseInt(r.cad_mes) < mesActual);

                    // --- COMPROBACIÓN ESTRICTA DE PERMISOS ---
                    let puedeEditar = false;
                    if (typeof datosUsuarioActual !== 'undefined' && datosUsuarioActual) {
                        if (datosUsuarioActual.rol === "admin") {
                            puedeEditar = true;
                        } else if (
                            datosUsuarioActual.facultad && r.facultad && datosUsuarioActual.facultad === r.facultad &&
                            datosUsuarioActual.departamento && r.departamento && datosUsuarioActual.departamento === r.departamento &&
                            datosUsuarioActual.laboratorio && r.laboratorio && datosUsuarioActual.laboratorio === r.laboratorio
                        ) {
                            puedeEditar = true;
                        }
                    }
                    // ------------------------------------------

                    return `
<tr style="border-bottom: 1px solid #e2e8f0;">
    <td style="text-align: center; padding: 10px 5px;">
        <span onclick="verFicha(${r.id})" style="cursor:pointer; font-size:1.2rem;">👁️</span>
        
        ${r.ficha_url ? `<span onclick="window.open('${r.ficha_url}','_blank')" style="cursor:pointer; font-size:1rem; margin-left:4px;">📋</span>` : ''}
        ${(r.fallido || r.nombre.includes("BUSCANDO") || r.nombre === r.cas)
                            ? `<span onclick="procesarNuevoReactivo('${r.cas}', true)" style="cursor:pointer; font-size:1rem; margin-left:4px;">⚠️</span>` : ''}
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-weight: bold; color: var(--primary); line-height: 1.2; font-size: 0.9rem;">${r.nombre}</div>
        <div style="font-size: 0.8rem; color: #1e293b; margin-top: 2px;">
            Stock: <strong>${r.cantidad}${r.unidad}</strong> 
            <span style="color: #64748b; font-size: 0.7rem;">(${r.stock || 1} ud)</span>
        </div>
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-size: 0.85rem; ${esCaducado ? 'color:var(--danger); font-weight:bold;' : 'color:var(--primary); font-weight:500;'}">
            Exp: ${r.cad_mes}/${r.cad_anio}
        </div>
        <div style="font-size: 0.75rem; color: #64748b; margin-top: 2px;">
            ${r.ubicacion} (${r.estante || '-'})
        </div>
    </td>
</tr>
`;
                }).join('');
            }

            function editarNombre(id) {
                const r = inventario.find(x => x.id === id);
                const n = prompt("Nombre del reactivo:", r.nombre.includes("NO ENCONTRADO") ? "" : r.nombre);
                if (n) { r.nombre = n.toUpperCase(); r.fallido = false; actualizarStorage(); render(); }
            }

            function borrar(id) {
                if (confirm("¿Eliminar?")) { inventario = inventario.filter(x => x.id !== id); actualizarStorage(); render(); }
            }

            function actualizarStorage() {
                // 1. Lo seguimos guardando en el navegador por si te quedas sin internet un momento
                localStorage.setItem('trace_reagents_inv', JSON.stringify(inventario));

                // 2. ¡LO GRABAMOS EN LA BASE DE DATOS!
                // Esto hace que el cambio sea permanente en la nube
                db.ref('inventario').set(inventario);
            }

            async function agregarCasManual() {
                const input = document.getElementById('inputCasManual');
                const cas = input.value.trim();

                // Validar formato básico de CAS (números y guiones)
                const casRegex = /\b\d{2,7}-\d{2}-\d{1}\b/;
                if (casRegex.test(cas)) {
                    input.value = ""; // Limpiar campo
                    await procesarNuevoReactivo(cas);
                } else {
                    alert("Por favor, introduce un formato de CAS válido (ej: 67-64-1)");
                }
            }

            function exportarCSV() {
                if (inventario.length === 0) {
                    alert("No hay datos para exportar");
                    return;
                }

                // 1. Mapeamos los datos para que las columnas tengan nombres elegantes en el Excel
                const datosExcel = inventario.map(r => ({
                    "Nombre del Producto": r.nombre,
                    "CAS": r.cas,
                    "Ubicación": r.ubicacion,
                    "Cantidad": r.cantidad,
                    "Unidad": r.unidad,
                    "Fecha Caducidad": `${r.cad_mes}/${r.cad_anio}`,
                    "Ficha Seguridad": r.ficha_url || "No disponible",
                    "Observaciones": (r.observaciones || "").replace(/\n/g, " ")
                }));

                // 2. Crear el libro de trabajo (Workbook) y la hoja (Worksheet)
                const hoja = XLSX.utils.json_to_sheet(datosExcel);
                const libro = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(libro, hoja, "Inventario");

                // 3. Definir anchos de columna para que sea de "Fácil Lectura"
                // wch es el número de caracteres de ancho
                hoja['!cols'] = [
                    { wch: 35 }, // Nombre
                    { wch: 15 }, // CAS
                    { wch: 25 }, // Ubicación
                    { wch: 10 }, // Cantidad
                    { wch: 10 }, // Unidad
                    { wch: 15 }, // Fecha Caducidad
                    { wch: 30 }, // Ficha Seguridad
                    { wch: 40 }  // Observaciones
                ];

                // 4. Generar nombre de archivo (manteniendo tu formato original)
                const ahora = new Date();
                const isoFecha = ahora.toISOString().split('T')[0];
                const hora = ahora.getHours().toString().padStart(2, '0') + "-" +
                    ahora.getMinutes().toString().padStart(2, '0');

                // Cambiamos la extensión a .xlsx para que Excel lo abra perfecto
                const nombreArchivo = `TraceReagents_${isoFecha}_${hora}.xlsx`;

                // 5. Exportar el archivo
                XLSX.writeFile(libro, nombreArchivo);
            }

            let editandoId = null;

            function verFicha(id) {
                const r = inventario.find(x => x.id === id);
                if (!r) return;

                // Guardamos el ID en la variable global que ya usas
                editandoId = id;

                // Configuración del botón Editar
                const btnEditar = document.getElementById('btnEditarFicha');
                if (btnEditar) {
                    // Tu lógica de permisos
                    let puedeEditar = (datosUsuarioActual && (datosUsuarioActual.rol === "admin" || datosUsuarioActual.laboratorio === r.laboratorio));

                    if (puedeEditar) {
                        btnEditar.style.display = 'inline-block';
                        btnEditar.onclick = function () {
                            // Cerramos la ficha para que no estorbe
                            document.getElementById('modalFicha').style.display = 'none';
                            // Llamamos a tu función de abrir editor
                            abrirEditorDesdeFicha();
                        };
                    } else {
                        btnEditar.style.display = 'none';
                    }
                }


                // 4. Pintar el contenido (Con la nueva estructura de CAS abajo)
                const contenido = document.getElementById('contenidoFicha');
                contenido.innerHTML = `
        <div class="ficha-header-wrapper">
            <h2 style="margin:0; color:var(--primary); line-height: 1.2; text-align: left; width: 100%;">${r.nombre}</h2>
            <span class="cas-badge">CAS: ${r.cas || 'No disponible'}</span>
                </div>
                <div class="ficha-dato"><span class="ficha-label">Facultad</span><span class="ficha-valor">${r.facultad || '-'}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Departamento</span><span class="ficha-valor">${r.departamento || '-'}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Laboratorio</span><span class="ficha-valor">${r.laboratorio || '-'}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Ubicación</span><span class="ficha-valor">${r.ubicacion}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Estante</span><span class="ficha-valor">${r.estante || '-'}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Referencia</span><span class="ficha-valor" style="font-weight:bold; color:var(--primary);">${r.ref || '-'}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Stock</span><span class="ficha-valor">${r.stock || 1} botes (${r.cantidad} ${r.unidad})</span></div>
                <div class="ficha-dato"><span class="ficha-label">Caducidad</span><span class="ficha-valor">${r.cad_mes}/${r.cad_anio}</span></div>
                <div class="ficha-dato"><span class="ficha-label">Notas</span><span class="ficha-valor">${r.observaciones || 'Sin notas'}</span></div>
            `;

                document.getElementById('modalFicha').style.display = 'flex';
            }

            function abrirEditorDesdeFicha() {
                // 1. Cerramos la ficha (el ojo)
                document.getElementById('modalFicha').style.display = 'none';

                if (editandoId) {
                    // 2. Preparamos los datos
                    prepararEditor(editandoId);

                    // 3. Mostramos el editor y nos aseguramos de que esté ARRIBA
                    const modalEd = document.getElementById('modalEdicion');
                    modalEd.style.display = 'flex';
                    modalEd.style.zIndex = '4000'; // Ponlo más alto que el modal de la ficha (3000)
                }
            }

            function cerrarModal() {
                document.getElementById('modalEdicion').style.display = 'none';
            }

            function prepararEditor(id) {
                const r = inventario.find(x => x.id === id);
                if (!r) return;

                // Sincronizar selectores de la ficha con los principales
                const cargarSelect = (idDestino, idOrigen, valor) => {
                    const dest = document.getElementById(idDestino);
                    dest.innerHTML = document.getElementById(idOrigen).innerHTML;
                    dest.value = valor || document.getElementById(idOrigen).value;
                };

                cargarSelect('editFacultad', 'selectFacultad', r.facultad);
                cargarSelect('editDepto', 'selectDepto', r.departamento);
                cargarSelect('editLab', 'selectLab', r.laboratorio);
                cargarSelect('editUbicacion', 'selectUbicacion', r.ubicacion);
                cargarSelect('editEstante', 'selectEstante', r.estante);

                // Rellenar campos de texto y número
                document.getElementById('editNombre').value = r.nombre;
                document.getElementById('editRef').value = r.ref || "";
                document.getElementById('editCant').value = r.cantidad || "";
                document.getElementById('editUnidad').value = r.unidad || "g";
                document.getElementById('editStock').value = r.stock || "1";
                document.getElementById('editObs').value = r.observaciones || "";
                document.getElementById('editFicha').value = r.ficha_url || "";
                document.getElementById('editCas').value = r.cas;

                // Configurar años en el selector de caducidad
                const anioSel = document.getElementById('editAnio');
                anioSel.innerHTML = "";
                const anioActual = new Date().getFullYear();
                for (let i = 0; i < 15; i++) {
                    let opt = document.createElement('option');
                    opt.value = anioActual + i; opt.text = anioActual + i;
                    anioSel.add(opt);
                }
                document.getElementById('editMes').value = r.cad_mes || "01";
                document.getElementById('editAnio').value = r.cad_anio || anioActual;
            }

            async function guardarCambiosModal() {
                // 1. Buscamos el reactivo en el inventario
                const r = inventario.find(x => x.id === editandoId);
                if (!r) return; // Seguridad por si no encuentra el ID

                // --- NUEVO: Recogemos el valor del CAS y vemos si lo has modificado ---
                const nuevoCas = document.getElementById('editCas') ? document.getElementById('editCas').value.trim() : r.cas;
                const casHaCambiado = (r.cas !== nuevoCas);

                // 2. Recogemos el valor de la nueva referencia
                const refVal = document.getElementById('editRef').value;

                // 3. Asignamos los valores de los desplegables y textos
                r.facultad = document.getElementById('editFacultad').value;
                r.departamento = document.getElementById('editDepto').value;
                r.laboratorio = document.getElementById('editLab').value;

                r.cas = nuevoCas; // <--- NUEVO: Actualizamos el CAS con lo que hayas escrito
                r.ref = refVal;
                r.nombre = document.getElementById('editNombre').value.toUpperCase();
                r.ubicacion = document.getElementById('editUbicacion').value;
                r.estante = document.getElementById('editEstante').value;

                // 4. Guardamos Tamaño y Stock
                r.cantidad = document.getElementById('editCant').value;
                r.unidad = document.getElementById('editUnidad').value;
                r.stock = document.getElementById('editStock').value;

                // 5. Datos de caducidad y otros
                r.cad_mes = document.getElementById('editMes').value;
                r.cad_anio = document.getElementById('editAnio').value;
                r.observaciones = document.getElementById('editObs').value;
                r.ficha_url = document.getElementById('editFicha').value;

                // 6. Lógica de PubChem: Se activa si falló antes O SI EL CAS HA CAMBIADO
                if (casHaCambiado || r.nombre.includes("BUSCANDO") || r.nombre === r.cas) {

                    if (casHaCambiado) {
                        r.nombre = "ACTUALIZANDO...";
                        render(); // Damos un pequeño parpadeo a la tabla para que sepas que está trabajando
                    }

                    const datos = await obtenerDatosQuimicos(r.cas);
                    r.nombre = datos.nombre;
                    if (datos.ficha) r.ficha_url = datos.ficha;
                }

                // 7. Finalizar: Guardar, Refrescar tabla y Cerrar Modal
                actualizarStorage();
                render();

                // NUEVO: Si la lupa (buscador) estaba abierta, actualizamos su tabla para que veas el cambio ahí también
                if (typeof realizarBusqueda === 'function') {
                    try { realizarBusqueda(); } catch (e) { }
                }

                document.getElementById('modalEdicion').style.display = 'none';
            }

            let ordenAscendente = true;

            function filtrarTabla() {
                const term = document.getElementById('buscador').value.toLowerCase();
                const filas = document.querySelectorAll('#cuerpoTabla tr');
                filas.forEach(fila => {
                    const texto = fila.innerText.toLowerCase();
                    fila.style.display = texto.includes(term) ? '' : 'none';
                });
            }


            function ordenarPor(columna) {
                ordenAscendente = !ordenAscendente;

                inventario.sort((a, b) => {
                    let valorA, valorB;
                    if (columna === 'nombre') {
                        valorA = (a.nombre || "").toLowerCase();
                        valorB = (b.nombre || "").toLowerCase();
                    } else if (columna === 'cad') {
                        // Genera un número comparable: 202505 (Mayo 2025)
                        valorA = parseInt((a.cad_anio || "0") + (a.cad_mes || "0").toString().padStart(2, '0'));
                        valorB = parseInt((b.cad_anio || "0") + (b.cad_mes || "0").toString().padStart(2, '0'));
                    }

                    if (valorA < valorB) return ordenAscendente ? -1 : 1;
                    if (valorA > valorB) return ordenAscendente ? 1 : -1;
                    return 0;
                });

                render(); // Actualiza la de fondo

                // REVISIÓN CLAVE: Forzar el redibujado del buscador
                if (document.getElementById('modalBuscador').style.display === 'flex') {
                    filtrarBusquedaRealTime();
                }
            }


            // Escuchamos la base de datos: cada vez que algo cambie en la nube, la tabla se actualiza sola
            db.ref('inventario').on('value', (snapshot) => {
                const datosNube = snapshot.val();
                if (datosNube) {
                    // Actualizamos nuestra lista local con lo que hay en la base de datos
                    inventario = datosNube;
                    // Dibujamos la tabla con los datos frescos
                    render();
                }
            });


            function abrirBuscador() {
                const modal = document.getElementById('modalBuscador');
                modal.style.display = 'flex';

                const input = document.getElementById('inputBuscadorReal');
                input.value = ''; // Aseguramos que el buscador empiece limpio
                input.focus();

                // Llamamos a la función de filtrado con el campo vacío 
                // para que muestre todos los reactivos de inicio
                filtrarBusquedaRealTime();
            }

            function cerrarBuscador() {
                document.getElementById('modalBuscador').style.display = 'none';
            }

            function filtrarBusquedaRealTime() {
                const term = document.getElementById('inputBuscadorReal').value.toLowerCase();
                const tabla = document.getElementById('cuerpoResultadosBusqueda');
                const ahora = new Date();
                const mesActual = ahora.getMonth() + 1;
                const anioActual = ahora.getFullYear();

                const filtrados = inventario.filter(r =>
                    r.nombre.toLowerCase().includes(term) ||
                    r.cas.includes(term) ||
                    (r.ref && r.ref.toLowerCase().includes(term)) ||
                    r.ubicacion.toLowerCase().includes(term)
                );

                if (filtrados.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#64748b;">No hay coincidencias</td></tr>';
                    return;
                }

                tabla.innerHTML = filtrados.map(r => {
                    // Lógica de caducidad
                    const esCaducado = (parseInt(r.cad_anio) < anioActual) ||
                        (parseInt(r.cad_anio) === anioActual && parseInt(r.cad_mes) < mesActual);
                    const estiloFecha = esCaducado ? 'color:var(--danger); font-weight:bold;' : 'color:#64748b;';

                    return `
<tr style="border-bottom: 1px solid #e2e8f0;">
    <td style="text-align: center; padding: 10px 5px;">
        <span onclick="verFicha(${r.id})" style="cursor:pointer; font-size:1.2rem;">👁️</span>
        ${r.ficha_url ? `<span onclick="window.open('${r.ficha_url}','_blank')" style="cursor:pointer; font-size:1rem; margin-left:4px;">📋</span>` : ''}
        ${(r.fallido || r.nombre.includes("BUSCANDO") || r.nombre === r.cas)
                            ? `<span onclick="procesarNuevoReactivo('${r.cas}', true)" style="cursor:pointer; font-size:1rem; margin-left:4px;">⚠️</span>` : ''}
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-weight: bold; color: var(--primary); line-height: 1.2; font-size: 0.9rem;">${r.nombre}</div>
        <div style="font-size: 0.8rem; color: #1e293b; margin-top: 2px;">
            Stock: <strong>${r.cantidad}${r.unidad}</strong> 
            <span style="color: #64748b; font-size: 0.7rem;">(${r.stock || 1} ud)</span>
        </div>
    </td>

    <td style="padding: 10px 5px;">
        <div style="font-size: 0.85rem; ${esCaducado ? 'color:var(--danger); font-weight:bold;' : 'color:var(--primary); font-weight:500;'}">
            Exp: ${r.cad_mes}/${r.cad_anio}
        </div>
        <div style="font-size: 0.75rem; color: #64748b; margin-top: 2px;">
            ${r.ubicacion} (${r.estante || '-'})
        </div>
    </td>
</tr>
`;
                }).join('');
            }

            function confirmarBorradoDesdeFicha() {
                if (confirm("¿Estás seguro de que deseas eliminar este reactivo permanentemente?")) {
                    borrar(editandoId); // Reutiliza tu función de borrar existente
                    document.getElementById('modalEdicion').style.display = 'none';
                }
            }


        </script>

        <div id="modalFicha"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center;">
            <div class="modal-content"
                style="background:white; width:95%; max-width:500px; border-radius:15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto;">

                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">

                    </div>

                <div id="contenidoFicha"></div>

                <div class="modal-content"

            <div id="modalManual"
                style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center;">
                <div class="modal-content">
                    <h3>Añadir CAS Manual</h3>

            <div id="modalBuscador">
                <div
